name: magic_night

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 18 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run bot
        env:
          Knox_Drayke: ${{ secrets.KNOX_DRAYKE_TOKEN }}
        run: |
          python bot/knox-drayke-bot.py
