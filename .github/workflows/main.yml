name: magic_night

on:
  workflow_dispatch:

  schedule:
    # 5 PM UTC = 10 PM Pakistan Time
    - cron: '0 17 * * *'

permissions:
  contents: write

concurrency:
  group: magic-night-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run bot
        env:
          Knox_Drayke: ${{ secrets.KNOX_DRAYKE_TOKEN }}
        run: |
          python bot/knox-drayke-bot.py

      - name: Commit progress files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add progress.json last_sent.json

          git diff --cached --quiet || git commit -m "Update bot progress [skip ci]"

          git push origin HEAD:main